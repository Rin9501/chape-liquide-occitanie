# ── Redirection www → racine (SEO : évite le duplicate content) ────────────
[[redirects]]
  from   = "https://www.chapeliquide-occitanie.fr/*"
  to     = "https://chapeliquide-occitanie.fr/:splat"
  status = 301
  force  = true

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Cache long durée : images et assets statiques ──────────────────────────
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML : toujours frais (pas de cache navigateur) ─────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Headers de sécurité sur toutes les pages ────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
